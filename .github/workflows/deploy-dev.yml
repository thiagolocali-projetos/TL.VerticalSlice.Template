name: Deploy DEV

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to DEV
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          script: |
            cd ~/docker/projetos/TL.VerticalSlice.Template
            git pull origin develop
            cd ~/docker
            docker compose -f docker-compose.dev.yml build --no-cache TL.VerticalSlice.Template-dev
            docker compose -f docker-compose.dev.yml up -d TL.VerticalSlice.Template-dev