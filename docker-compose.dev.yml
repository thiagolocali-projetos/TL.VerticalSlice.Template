version: "3.8"
services:
  app:
    build: .
    container_name: TL.VerticalSlice.Template-dev
    ports:
      - "5005:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - NODE_ENV=development
    networks:
      - tlserver-dev
    restart: unless-stopped
networks:
  tlserver-dev:
    driver: bridge