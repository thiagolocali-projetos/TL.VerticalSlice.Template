version: "3.8"
services:
  app:
    build: .
    container_name: TL.VerticalSlice.Template-prod
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - NODE_ENV=production
    networks:
      - tlserver-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
networks:
  tlserver-prod:
    driver: bridge