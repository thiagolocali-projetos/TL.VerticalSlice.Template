version: "3.8"
services:
  app:
    build: .
    container_name: TL.VerticalSlice.Template-prod
    ports:
      - "5014:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - NODE_ENV=production
    networks:
      - tlserver-prod
    restart: unless-stopped
networks:
  tlserver-prod:
    driver: bridge