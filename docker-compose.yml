version: '3.8'

services:
  # ESSENTIAL: SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tl-verticalslice-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password@2024"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    networks:
      - tl-network
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password@2024 -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OPTIONAL: Redis Cache
